spring:
  application:
    name: demo
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/gym_db?useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:achref2025}

  jpa:
    hibernate:
      ddl-auto: update   # create / update / validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      indent-output: true

# JWT settings. In production, ALWAYS override JWT_SECRET with a strong random value (>= 32 chars).
jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-a-32-char-min-secret}
  expiration: ${JWT_EXPIRATION:86400000}

server:
  port: 8080
